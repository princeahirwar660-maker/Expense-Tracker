services:
  - type: web
    name: spendsmart
    runtime: python
    buildCommand: pip install -r requirements.txt && python init_db.py
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: JWT_EXPIRY_HOURS
        value: "48"
      - key: DB_PATH
        value: "spendsmart.db"
